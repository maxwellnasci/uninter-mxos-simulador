name: Testar e fazer deploy no servidor

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Verificar projeto
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar se server.js existe
        run: |
          if [ ! -f backend/server.js ]; then
            echo "ERRO: backend/server.js não encontrado!"
            exit 1
          fi
          echo "OK: server.js encontrado"

      - name: Verificar se frontend existe
        run: |
          if [ ! -f frontend/index.html ]; then
            echo "ERRO: frontend/index.html não encontrado!"
            exit 1
          fi
          echo "OK: index.html encontrado"

  deploy:
    name: Deploy no Contabo
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Conectar no servidor e atualizar código
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            echo "=== Iniciando deploy ==="
            cd /root/mxos-simulador/uninter-mxos-simulador
            echo "=== Atualizando código ==="
            git pull origin main
            echo "=== Instalando dependências ==="
            cd backend
            npm install --production
            echo "=== Reiniciando servidor ==="
            pm2 restart mxos-simulador
            echo "=== Deploy concluído! ==="
